<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기도나눔 - 함께 기도해요</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: linear-gradient(180deg, #6DD4A8, #ffffff);
      color: #1a2e1a;
      min-height: 100vh;
    }

    /* Header */
    .header {
      color: white;
      padding: 32px 20px 16px;
      text-align: center;
    }

    .header-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
      margin-left: -24px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* View Toggle */
    .view-toggle {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 0 20px 12px;
    }

    .view-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-btn.active {
      background: white;
      color: #6BB89A;
      font-weight: 600;
      border-color: white;
    }

    /* Section Title */
    .section-header {
      max-width: 480px;
      margin: 0 auto;
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .card-count {
      background: rgba(255,255,255,0.25);
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .section-header-spacer { flex: 1; }

    .search-icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-icon-btn:hover { background: rgba(255,255,255,0.35); }
    .search-icon-btn.active { background: white; color: #6BB89A; border-color: white; }

    .fav-filter-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .fav-filter-btn:hover { background: rgba(255,255,255,0.35); }
    .fav-filter-btn.active { background: white; color: #F2C744; border-color: white; }
    .fav-filter-btn svg { fill: none; }
    .fav-filter-btn.active svg { fill: currentColor; }

    /* Search Bar */
    .search-bar {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 24px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.25s ease, opacity 0.2s ease, padding-bottom 0.25s ease;
    }

    .search-bar.open {
      max-height: 60px;
      opacity: 1;
      padding-bottom: 8px;
    }

    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      border-radius: 20px;
      padding: 8px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .search-input-wrap svg { color: #88a88e; flex-shrink: 0; }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 13px;
      color: #1a2e1a;
      background: transparent;
      font-family: inherit;
    }

    .search-input::placeholder { color: #a8bba8; }

    .search-clear {
      background: none;
      border: none;
      color: #88a88e;
      cursor: pointer;
      padding: 2px;
      display: none;
      align-items: center;
    }

    .search-clear.visible { display: flex; }

    @media (max-width: 480px) {
      .search-bar { padding: 0 16px; }
    }

    /* === LIST VIEW === */
    .list-view {
      max-width: 480px;
      margin: 0 auto;
      padding: 8px 24px 100px;
    }

    @media (max-width: 480px) {
      body { background: linear-gradient(180deg, #6DD4A8 0, #6DD4A8 200px, #ffffff 600px); }
      .list-view { padding: 8px 16px 100px; }
      .section-header { padding: 8px 16px; }
      .carousel-wrapper { padding: 8px 20px 16px; }
    }

    .list-view .prayer-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    /* === CAROUSEL VIEW === */
    .carousel-view {
      display: none;
      padding: 8px 0 100px;
      max-width: 480px;
      margin: 0 auto;
    }

    .carousel-wrapper {
      overflow-x: hidden;
      overflow-y: visible;
      position: relative;
      padding: 8px 9% 16px;
    }

    .carousel-track {
      display: flex;
      gap: 16px;
      transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .carousel-track .prayer-card {
      width: 100%;
      min-width: 100%;
      min-height: 280px;
      opacity: 0.35;
      transform: scale(0.92);
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.5s ease;
    }

    .carousel-track .prayer-card.is-active {
      opacity: 1;
      transform: scale(1);
    }

    .carousel-track .card-content {
      font-size: 14px;
      flex: 1;
    }

    .carousel-track .card-footer {
      margin-top: auto;
    }

    /* Carousel Indicator */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: all 0.3s;
    }

    .carousel-dot.active {
      background: white;
      width: 20px;
      border-radius: 4px;
    }

    /* Carousel Nav */
    .carousel-nav {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
    }

    .carousel-nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .carousel-nav-btn:hover {
      background: rgba(255,255,255,0.35);
    }

    /* === SHARED CARD STYLES === */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-name {
      font-size: 14px;
      font-weight: 800;
      color: #1a2e1a;
    }

    .card-date {
      font-size: 11px;
      color: #88a88e;
    }

    .card-content {
      font-size: 13px;
      line-height: 1.65;
      color: #3a4a3a;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .card-content .prayer-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 3px;
    }

    .card-content .prayer-item:last-child { margin-bottom: 0; }

    .card-content .prayer-item .num {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #EEF5EE;
      color: #4F8A6E;
      font-weight: 700;
      font-size: 11px;
      line-height: 1;
      margin-top: 1px;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      overflow: hidden;
    }

    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      margin: -4px -4px -4px 0;
      display: inline-flex;
      align-items: center;
      color: #c8d4c8;
      transition: color 0.15s, transform 0.15s;
    }

    .fav-btn svg { fill: none; }
    .fav-btn:hover { color: #F2C744; }
    .fav-btn.active { color: #F2C744; }
    .fav-btn.active svg { fill: currentColor; }
    .fav-btn:active { transform: scale(0.88); }

    .pray-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 14px;
      padding: 6px 14px;
      border-radius: 16px;
      border: 1px solid #b5dece;
      background: #eef7f2;
      font-size: 12px;
      color: #2F8B63;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pray-btn:hover, .pray-btn.prayed {
      background: #7AC4AA;
      color: white;
      border-color: #7AC4AA;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.8);
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 16px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* Loading State */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.8);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* QR Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .qr-modal {
      background: white;
      width: 100%;
      max-width: 360px;
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      animation: fadeIn 0.2s ease;
      margin: auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .qr-modal h2 { font-size: 16px; font-weight: 700; color: #1a2e1a; margin-bottom: 8px; }
    .qr-modal p { font-size: 12px; color: #88a88e; margin-bottom: 20px; }
    #qrcode { display: flex; justify-content: center; margin-bottom: 20px; }

    .qr-close-btn {
      padding: 12px 32px;
      background: #eef7f2;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #6BB89A;
      cursor: pointer;
    }

    .qr-close-btn:hover { background: #dceee4; }

    /* Share Button */
    .share-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: white;
      color: #6BB89A;
      border: none;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      z-index: 90;
    }

    .share-btn:hover { transform: scale(1.08); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

  <script>
    // ============================================
    // Firebase 설정 - 아래 값을 본인의 Firebase 프로젝트 값으로 교체하세요
    // ============================================
    const firebaseConfig = {
      apiKey: "AIzaSyBB1R5ikVGKz2YmMKueqDQZw5FyYjAxpx0",
      authDomain: "prayer-share-d9850.firebaseapp.com",
      databaseURL: "https://prayer-share-d9850-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "prayer-share-d9850",
      storageBucket: "prayer-share-d9850.firebasestorage.app",
      messagingSenderId: "218015044662",
      appId: "1:218015044662:web:3d23bc74ac9acc74e0b51f7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentView = 'list';
    let carouselIndex = 0;
    let prayers = [];
    let searchQuery = '';

    const FAV_KEY = 'prayer_favorites_v1';
    let favSet = new Set();
    try {
      favSet = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));
    } catch (e) { favSet = new Set(); }
    let showFavOnly = false;

    function saveFavs() {
      localStorage.setItem(FAV_KEY, JSON.stringify([...favSet]));
    }

    function toggleFav(id, e) {
      if (e) e.stopPropagation();
      if (favSet.has(id)) favSet.delete(id);
      else favSet.add(id);
      saveFavs();
      if (showFavOnly) {
        renderPrayers();
      } else {
        document.querySelectorAll(`.fav-btn[data-id="${id}"]`).forEach(btn => {
          btn.classList.toggle('active', favSet.has(id));
        });
      }
    }

    function toggleFavFilter() {
      showFavOnly = !showFavOnly;
      document.getElementById('favFilterBtn').classList.toggle('active', showFavOnly);
      carouselIndex = 0;
      renderPrayers();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getItems(p) {
      if (Array.isArray(p.items)) return p.items.filter(Boolean);
      if (typeof p.content === 'string' && p.content.trim()) return [p.content];
      return [];
    }

    function buildCard(prayer) {
      const date = new Date(prayer.createdAt).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });
      const prayCount = prayer.prayCount || 0;
      const items = getItems(prayer);
      const contentHtml = items.length > 1
        ? items.map((t, i) => `<div class="prayer-item"><span class="num">${i + 1}</span><span>${escapeHtml(t)}</span></div>`).join('')
        : (items[0] ? escapeHtml(items[0]) : '');
      return `
        <div class="prayer-card">
          <div class="card-header">
            <div class="card-name">${escapeHtml(prayer.name)}</div>
            <button class="fav-btn ${favSet.has(prayer.id) ? 'active' : ''}" data-id="${prayer.id}" onclick="toggleFav('${prayer.id}', event)" aria-label="즐겨찾기">
              <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </button>
          </div>
          <div class="card-content">${contentHtml}</div>
          <div class="card-footer">
            <div class="card-date">${date}</div>
            <button class="pray-btn" onclick="togglePray(this, '${prayer.id}')">
              🙏 기도했어요 ${prayCount > 0 ? '<span>' + prayCount + '</span>' : ''}
            </button>
          </div>
        </div>
      `;
    }

    // === 렌더링 ===
    function getFilteredPrayers() {
      let list = prayers;
      if (showFavOnly) list = list.filter(p => favSet.has(p.id));
      const q = searchQuery.trim().toLowerCase();
      if (q) list = list.filter(p => (p.name || '').toLowerCase().includes(q));
      return list;
    }

    function renderPrayers() {
      const list = getFilteredPrayers();
      document.getElementById('cardCount').textContent = list.length;

      const listEl = document.getElementById('listView');
      if (list.length === 0) {
        let empty;
        if (searchQuery.trim()) {
          empty = `<div class="empty-state"><div class="icon">🔍</div><p>"${escapeHtml(searchQuery)}" 검색 결과가 없습니다.</p></div>`;
        } else if (showFavOnly) {
          empty = `<div class="empty-state"><div class="icon">⭐</div><p>아직 즐겨찾기한 기도제목이 없습니다.<br>카드의 별 아이콘을 눌러 추가해보세요.</p></div>`;
        } else {
          empty = `<div class="empty-state"><div class="icon">🕊️</div><p>아직 기도제목이 없습니다.<br>관리자가 기도제목을 등록하면 여기에 표시됩니다.</p></div>`;
        }
        listEl.innerHTML = empty;
        document.getElementById('carouselTrack').innerHTML = empty;
        document.getElementById('carouselDots').innerHTML = '';
        return;
      }

      listEl.innerHTML = list.map(buildCard).join('');

      document.getElementById('carouselTrack').innerHTML = list.map(buildCard).join('');
      renderDots(list.length);
      if (carouselIndex >= list.length) carouselIndex = list.length - 1;
      if (carouselIndex < 0) carouselIndex = 0;
      updateCarousel();
    }

    // === 검색 ===
    function toggleSearch() {
      const bar = document.getElementById('searchBar');
      const btn = document.getElementById('searchIconBtn');
      const input = document.getElementById('searchInput');
      const isOpen = bar.classList.toggle('open');
      btn.classList.toggle('active', isOpen);
      if (isOpen) {
        setTimeout(() => input.focus(), 100);
      } else {
        clearSearch();
      }
    }

    function onSearchInput() {
      const input = document.getElementById('searchInput');
      searchQuery = input.value;
      document.getElementById('searchClear').classList.toggle('visible', searchQuery.length > 0);
      carouselIndex = 0;
      renderPrayers();
    }

    function clearSearch() {
      const input = document.getElementById('searchInput');
      input.value = '';
      searchQuery = '';
      document.getElementById('searchClear').classList.remove('visible');
      carouselIndex = 0;
      renderPrayers();
    }

    // === 뷰 전환 ===
    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      if (view === 'list') {
        document.getElementById('listView').style.display = 'block';
        document.getElementById('carouselView').style.display = 'none';
      } else {
        document.getElementById('listView').style.display = 'none';
        document.getElementById('carouselView').style.display = 'block';
        carouselIndex = 0;
        updateCarousel();
      }
    }

    // === 캐러셀 ===
    function renderDots(count) {
      const dots = document.getElementById('carouselDots');
      dots.innerHTML = Array.from({ length: count }, (_, i) =>
        `<div class="carousel-dot ${i === 0 ? 'active' : ''}"></div>`
      ).join('');
    }

    function getCardStep() {
      const track = document.getElementById('carouselTrack');
      const cards = track.querySelectorAll('.prayer-card');
      if (cards.length === 0) return 0;
      return cards[0].offsetWidth + 16;
    }

    function updateCarousel(animate) {
      const track = document.getElementById('carouselTrack');
      if (animate === false) {
        track.style.transition = 'none';
      } else {
        track.style.transition = 'transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1)';
      }
      track.style.transform = `translateX(-${carouselIndex * getCardStep()}px)`;

      track.querySelectorAll('.prayer-card').forEach((card, i) => {
        card.classList.toggle('is-active', i === carouselIndex);
      });

      document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === carouselIndex);
      });
    }

    function carouselNext() {
      if (carouselIndex < prayers.length - 1) {
        carouselIndex++;
        updateCarousel();
      }
    }

    function carouselPrev() {
      if (carouselIndex > 0) {
        carouselIndex--;
        updateCarousel();
      }
    }

    // 스와이프 with drag
    let touchStartX = 0;
    let touchDragging = false;
    let dragOffset = 0;

    document.addEventListener('touchstart', (e) => {
      if (currentView !== 'carousel') return;
      touchStartX = e.touches[0].clientX;
      touchDragging = true;
      dragOffset = 0;
      const track = document.getElementById('carouselTrack');
      track.style.transition = 'none';
    });

    document.addEventListener('touchmove', (e) => {
      if (!touchDragging || currentView !== 'carousel') return;
      dragOffset = touchStartX - e.touches[0].clientX;
      const track = document.getElementById('carouselTrack');
      const base = carouselIndex * getCardStep();
      track.style.transform = `translateX(-${base + dragOffset}px)`;
    });

    document.addEventListener('touchend', (e) => {
      if (!touchDragging || currentView !== 'carousel') return;
      touchDragging = false;
      if (Math.abs(dragOffset) > 60) {
        if (dragOffset > 0) carouselNext();
        else carouselPrev();
      } else {
        updateCarousel();
      }
    });

    // === 기도 버튼 ===
    function togglePray(btn, id) {
      if (btn.classList.contains('prayed')) return;
      btn.classList.add('prayed');
      const ref = db.ref('prayers/' + id + '/prayCount');
      ref.transaction(count => (count || 0) + 1);
    }

    // === Firebase 실시간 리스너 ===
    db.ref('prayers').on('value', (snapshot) => {
      prayers = [];
      snapshot.forEach((child) => {
        prayers.push({ id: child.key, ...child.val() });
      });
      // 관리자가 지정한 order 내림차순, 없으면 createdAt 기준
      prayers.sort((a, b) => {
        const ao = a.order != null ? a.order : new Date(a.createdAt).getTime();
        const bo = b.order != null ? b.order : new Date(b.createdAt).getTime();
        return bo - ao;
      });
      renderPrayers();
    });

    // === QR ===
    let qrGenerated = false;
    function showQR() {
      document.getElementById('qrModal').classList.add('active');
      if (!qrGenerated) {
        new QRCode(document.getElementById("qrcode"), {
          text: "https://prayer-share-seven.vercel.app/", width: 200, height: 200,
          colorDark: "#6BB89A", colorLight: "#ffffff",
        });
        qrGenerated = true;
      }
    }
    function closeQR(e) {
      if (e.target === e.currentTarget)
        document.getElementById('qrModal').classList.remove('active');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
